<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricista Matriculado Córdoba - Servicio Técnico Profesional</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #2563eb;
            --text-main: #0f172a;
            --text-sub: #475569;
            --bg-card: rgba(255, 255, 255, 0.96); /* Un blanco sutilmente traslúcido pro */
            --border-color: #e2e8f0;
            --wsp-green: #25d366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            color: var(--text-main);
            /* Fondo general de un técnico trabajando en un tablero con un filtro claro */
            background: linear-gradient(rgba(248, 250, 252, 0.9), rgba(248, 250, 252, 0.9)), 
                        url('https://images.unsplash.com/photo-1621905251189-08b45d6a269e?auto=format&fit=crop&q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
            line-height: 1.6;
        }

        /* Contenedor Principal Centrado */
        .container {
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: relative;
        }

        /* Botón de WhatsApp Flotante que acompaña el Scroll */
        .wsp-floating-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--wsp-green);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            transition: transform 0.2s, background-color 0.2s;
        }

        .wsp-floating-btn:hover {
            background-color: #1ebd58;
            transform: scale(1.03);
        }

        .wsp-icon-svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Encabezado Claro y Organizado */
        .hero {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 45px 24px;
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: 16px;
            color: var(--text-sub);
            max-width: 550px;
            margin: 0 auto 24px auto;
        }

        /* Recuadros de Confianza (Pilares) */
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .trust-item {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Estructura Principal en Bloques */
        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Grid Dual: Recuadros Especiales con tus Fotos Reales de Fondo */
        .photo-cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .card-with-bg {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            min-height: 280px;
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        /* Tarjeta 1 con image_4 de fondo */
        .card-bg-1 {
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95) 40%, rgba(15, 23, 42, 0.4)), 
                        url('image_4.png.
